<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics Review — 2026-05-26 AM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #0f1117; color: #e2e8f0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  .container { width: 100%; max-width: 780px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .date-label { font-size: 13px; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; }
  .session-badge { display: inline-block; background: #1e3a8a; color: #93c5fd; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin-top: 5px; }
  .progress-text { font-size: 28px; font-weight: 700; color: #f1f5f9; text-align: right; }
  .progress-sub { font-size: 12px; color: #475569; text-align: right; margin-top: 2px; }

  /* Progress bar */
  .progress-bar-wrap { height: 4px; background: #1e293b; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 2px; transition: width 0.3s ease; }

  /* Card */
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px 28px; margin-bottom: 20px; }
  .ticker-tag { display: inline-block; background: #0f172a; border: 1px solid #334155; color: #94a3b8; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 6px; letter-spacing: 0.08em; margin-bottom: 20px; }

  /* Section divider */
  .section-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0 16px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: #1e3a8a;
  }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 2px 12px;
    border-radius: 20px;
  }
  .section-label.cn { color: #f59e0b; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
  .section-label.en { color: #60a5fa; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3); }

  /* Field */
  .field-block { margin-bottom: 16px; }
  .field-label { font-size: 11px; font-weight: 600; color: #475569; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }

  /* Content boxes */
  .field-content {
    font-size: 14px; line-height: 1.65; word-break: break-word;
    border-radius: 10px; padding: 12px 16px; margin-bottom: 9px;
  }
  .field-content.cn-content {
    color: #fcd34d; background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
  }
  .field-content.en-content {
    color: #e2e8f0; background: #0f172a;
    border: 1px solid #334155;
  }
  .field-content.body-cn { font-size: 13px; color: #fbbf24; }
  .field-content.body-en { font-size: 13px; color: #cbd5e1; }

  /* Buttons */
  .copy-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; margin-bottom: 4px; }
  .copy-title-cn-btn { background: rgba(217,119,6,0.8); color: #fff; }
  .copy-title-cn-btn:hover { background: #d97706; }
  .copy-title-en-btn { background: #1d4ed8; color: #fff; }
  .copy-title-en-btn:hover { background: #2563eb; }
  .copy-body-cn-btn  { background: rgba(180,83,9,0.8); color: #fff; }
  .copy-body-cn-btn:hover  { background: #b45309; }
  .copy-body-en-btn  { background: #0f766e; color: #fff; }
  .copy-body-en-btn:hover  { background: #0d9488; }
  .copy-btn.copied { background: #166534 !important; color: #bbf7d0 !important; }

  /* Hint */
  .hint { font-size: 12px; color: #334155; text-align: center; margin-bottom: 14px; }
  .hint kbd { background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #64748b; }

  /* Nav */
  .nav { display: flex; gap: 12px; }
  .nav-btn { flex: 1; padding: 13px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
  .nav-btn:hover:not(:disabled) { background: #334155; color: #e2e8f0; border-color: #475569; }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* Done */
  .done-banner { display: none; text-align: center; padding: 28px; background: #14532d; border: 1px solid #166534; border-radius: 16px; color: #bbf7d0; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .done-sub { font-size: 13px; opacity: 0.8; margin-top: 8px; display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="date-label">2026-05-26</div>
      <div class="session-badge">AM</div>
    </div>
    <div>
      <div class="progress-text" id="progressText">1 / 6</div>
      <div class="progress-sub">topics</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:16.7%"></div>
  </div>

  <div id="doneBanner" class="done-banner">
    ✅ All done! 6 topics uploaded
    <span class="done-sub">记得运行 python3 learn_from_edits.py 记录本次偏好</span>
  </div>

  <div id="card" class="card" >
    <div class="ticker-tag" id="tickerTag"></div>

    <!-- ── 中文区块 ── -->
    <div class="section-divider"><span class="section-label cn">中文</span></div>

    <div class="field-block">
      <div class="field-label">标题</div>
      <div class="field-content cn-content" id="titleCn"></div>
      <button class="copy-btn copy-title-cn-btn" onclick="copyField('title_cn')">复制标题（中文）</button>
    </div>

    <div class="field-block">
      <div class="field-label">正文</div>
      <div class="field-content cn-content body-cn" id="bodyCn"></div>
      <button class="copy-btn copy-body-cn-btn" onclick="copyField('body_cn')">复制正文（中文）</button>
    </div>

    <!-- ── 英文区块 ── -->
    <div class="section-divider"><span class="section-label en">English</span></div>

    <div class="field-block">
      <div class="field-label">Title</div>
      <div class="field-content en-content" id="titleEn"></div>
      <button class="copy-btn copy-title-en-btn" onclick="copyField('title_en')">Copy Title (EN)</button>
    </div>

    <div class="field-block">
      <div class="field-label">Body</div>
      <div class="field-content en-content body-en" id="bodyEn"></div>
      <button class="copy-btn copy-body-en-btn" onclick="copyField('body_en')">Copy Body (EN)</button>
    </div>
  </div>

  <div class="hint">
    <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp;|&nbsp;
    <kbd>1</kbd> 复制标题(中) &nbsp;|&nbsp;
    <kbd>2</kbd> 复制正文(中) &nbsp;|&nbsp;
    <kbd>T</kbd> Copy Title(EN) &nbsp;|&nbsp;
    <kbd>B</kbd> Copy Body(EN)
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" >Next →</button>
  </div>

</div>
<script>
const topics = [
  { ticker: "01810HK", title_cn: "小米财报前瞻：AIoT+汽车双引擎能否兑现高增长？", body_cn: "小米周二盘前发布财报，核心看点是手机高端化ASP提升进度与小米汽车SU7系列的毛利率改善幅度。汽车业务单季交付目标能否实现正毛利，以及AIoT设备出货量能否支撑高端生态溢价定价。若汽车业务毛利率首次转正且手机ASP突破前高。小米正在从手机公司变成生态公司——这一步，财报能走稳吗？小米股价腰斩，在30港元还会继续下跌吗？", title_en: "Xiaomi Earnings Preview: Can AIoT and EV Dual Engines Deliver High Growth?", body_en: "Xiaomi reports Tuesday pre-market, with key focus on smartphone premium ASP trajectory and SU7 series gross margin improvement. Investors will watch whether the EV segment achieves positive gross margin within the quarter and whether AIoT shipment volumes can sustain premium ecosystem pricing. If EV gross margin turns positive for the first time and smartphone ASP breaks prior highs, can this earnings report confirm Xiaomi's transformation from a handset company to an ecosystem platform — and with the stock down 50%, will it keep falling below HK$30?" },
  { ticker: "PDD", title_cn: "大涨or大跌？拼多多这次财报你怎么看？", body_cn: "拼多多周三盘前发布财报。Temu能否通过本土仓储模式有效对冲关税冲击，以及国内多多买菜和平台货币化率提升能否填补海外压力缺口。若Temu收入增速明显下滑但集团利润率反而改善，市场将重新评估其资本效率和战略灵活性。pdd每次财报后都会大跌or大涨，这次你押注哪边？", title_en: "Big Surge or Big Drop? What's Your Call on PDD Earnings?", body_en: "PDD Holdings reports Wednesday pre-market, with focus on whether Temu can effectively offset tariff headwinds via a local warehousing model, and whether domestic Duoduo Maicai growth and platform monetization rate improvement can fill the overseas revenue gap. If Temu revenue growth slows materially but group-level margins improve, markets will reassess PDD's capital efficiency and strategic flexibility. PDD has swung sharply in either direction after every earnings release — which side are you betting on this time?" },
  { ticker: "MRVL", title_cn: "Marvell财报：AI定制芯片能接棒NVDA叙事吗？", body_cn: "Marvell Technology周三盘后发布财报，AI定制芯片（ASIC）收入规模与数据中心业务增长指引是本季焦点——这直接检验MRVL是否正在成为超大规模云厂商定制算力的核心供应商。Google TPU、Amazon Trainium等定制芯片协议的实际采购速度。若ASIC收入季环比加速增长且管理层给出超共识的下季指引，MRVL将从\"NVDA替代品\"正式跨越为\"AI基础设施独立叙事\"。AI算力的第二战场，MRVL能站稳脚跟吗？", title_en: "Marvell Earnings: Can Custom AI Chips Take the Baton From NVDA?", body_en: "Marvell Technology (MRVL) reports Wednesday post-market, with custom AI ASIC revenue scale and data center growth guidance as the quarter's focal points — a direct test of whether MRVL is cementing its role as a core custom compute supplier to hyperscalers. Actual procurement velocity under Google TPU and Amazon Trainium chip agreements will be closely scrutinized. If ASIC revenue accelerates quarter-over-quarter and management issues above-consensus forward guidance, MRVL would graduate from \"NVDA alternative\" to a standalone AI infrastructure narrative. Can MRVL hold its ground on AI compute's second front?" },
  { ticker: "SNOW", title_cn: "Snowflake & Salesforce财报，Agent AI？", body_cn: "Snowflake和Salesforce周三盘后发布财报。Agent AI叙事能否成为saas转型的关键。产品收入增速能否重回30%以上且AI功能带动净新增ARR？SNOW的AI转型，是真实的业务飞轮，还是被迫的叙事追赶？crm作为企业AI代理的最大布局者，这季能把概念变成数字吗？", title_en: "Snowflake & Salesforce Earnings: Will Agentic AI Validate the SaaS Pivot?", body_en: "Snowflake and Salesforce both report Wednesday post-market, with the central question being whether the Agentic AI narrative can serve as a genuine catalyst for SaaS transformation. Key metrics include whether product revenue growth re-accelerates above 30% and whether AI features are driving net new ARR. Is SNOW's AI pivot a real business flywheel or a reactive narrative play — and can CRM, the most aggressive enterprise AI agent investor, convert concept into hard numbers this quarter?" },
  { ticker: "DELL", title_cn: "戴尔周四财报，AI服务器订单能撑起AI基础设施叙事吗？", body_cn: "戴尔科技（DELL）周四盘后发布财报，AI服务器（PowerEdge + GB200 NVL机架）的积压订单消化速度与新订单增长是本季最关键指标，直接检验DELL作为NVIDIA下游最大分销商的AI红利兑现进度。AI服务器的高增长能否完全抵消传统PC和企业IT硬件的周期性疲软，以及利润率结构是否会因AI服务器低毛利而承压。若AI相关收入占比超预期且订单积压创新高，DELL将从\"传统IT公司\"被重新定价为\"AI基础设施不可或缺的组件\"。AI算力需求如此旺盛，DELL的订单里藏着多大的惊喜？", title_en: "Dell Thursday Earnings: Can AI Server Orders Sustain the Infrastructure Narrative?", body_en: "Dell Technologies (DELL) reports Thursday post-market, with AI server backlog absorption pace and new order growth — spanning PowerEdge and GB200 NVL rack configurations — as the quarter's most critical indicators, directly testing DELL's progress in monetizing its position as NVIDIA's largest downstream distributor. Key questions include whether AI server hypergrowth can fully offset cyclical weakness in traditional PC and enterprise IT hardware, and whether margins face structural pressure from AI servers' characteristically thin gross margins. If AI-related revenue share exceeds expectations and order backlog hits a new record, DELL would be repriced from legacy IT vendor to indispensable AI infrastructure component. With AI compute demand this robust, just how big is the upside hiding in DELL's order book?" },
  { ticker: "XPEV", title_cn: "小鹏，理想财报来袭，MONA系列能让毛利率翻身吗？", body_cn: "小鹏汽车（XPEV）周四盘前发布财报，MONA M03和P7+系列的单车毛利率改善是本季关键验证点——这是小鹏从\"烧钱扩规模\"向\"规模摊薄成本\"叙事切换的核心数据。L6/L7/L8/L9系列的季度交付总量与单车毛利率走势是核心焦点，市场还将关注理想在纯电路线上的最新进展以及MEGA复苏信号。两家中国车企，你更看好谁？", title_en: "Xpeng & Li Auto Earnings: Can MONA Series Stage a Gross Margin Comeback?", body_en: "Xpeng (XPEV) reports Thursday pre-market, with per-vehicle gross margin improvement across the MONA M03 and P7+ series serving as the quarter's key validation point — the critical data that would confirm Xpeng's narrative shift from cash-burning scale expansion to cost dilution through volume. For Li Auto, quarterly delivery totals and per-vehicle gross margin trends across the L6/L7/L8/L9 lineup are the core focus, alongside the latest developments on its pure-EV strategy and any MEGA recovery signals. Between these two Chinese EV makers, which one are you more bullish on?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
